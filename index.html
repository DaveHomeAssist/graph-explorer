// Long-press for touch (500ms)
let longPressTimer = null;
document.getElementById('nodeGroup').addEventListener('pointerdown', function(e) {
  if (e.pointerType !== 'touch') return;
  const g = e.target.closest('.node:not(.dimmed)');
  if (!g) return;
  longPressTimer = setTimeout(() => {
    const id = g.dataset.id;
    pushUndoSnapshot();
    state.pathMode = true; state.selectedId = id; state.pathTarget = null;
    pathNodeIds.clear(); pathEdgeKeys.clear(); pathSteps = [];
    document.getElementById('pathBtn').textContent = '⤳ Path ON';
    announce('Path source: ' + (nodeMap[id]?.label || id));
    render(false);
  }, 500);
});
document.getElementById('nodeGroup').addEventListener('pointerup', () => clearTimeout(longPressTimer));
document.getElementById('nodeGroup').addEventListener('pointermove', () => clearTimeout(longPressTimer));

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  const urlState = readStateFromUrl();
  loadPathHistory();
  updateUndoButtons();

  // 1. Load manifest
  const m = await loadManifest();
  if (!m) return;

  // 2. Resolve initial map
  const requestedMap = urlState.map;
  const validMap = m.maps.find(entry => entry.id === requestedMap);
  const initialMap = validMap || m.maps[0];

  // 3. Setup selector
  setupMapSelector(m.maps, initialMap.id);

  // 4. Load the map pack
  const ok = await loadMapPack(initialMap);
  if (!ok) return;

  // 5. Apply URL state overrides
  if (urlState.node && nodeMap[urlState.node]) state.selectedId = urlState.node;
  if (urlState.layer) { state.layer = urlState.layer; document.getElementById('layerF').value = urlState.layer; }
  if (urlState.focus) state.focus = urlState.focus;
  if (urlState.heat === '1') { state.heatmap = true; document.getElementById('heatBtn').textContent = '🌡 Heatmap ON'; }
  if (urlState.q) { state.search = urlState.q; document.getElementById('search').value = urlState.q; }
  if (urlState.theme) applyTheme(urlState.theme);
  if (urlState.path) {
    const [src, tgt] = urlState.path.split(',');
    if (src && tgt && nodeMap[src] && nodeMap[tgt]) {
      state.selectedId = src;
      state.pathMode = true;
      state.pathTarget = tgt;
      document.getElementById('pathBtn').textContent = '⤳ Path ON';
    }
  }

  layoutCache = null;
  const hasZoomState = urlState.zk;
  render(!hasZoomState); // skip fitToView if zoom state is in URL

  // Restore zoom transform from URL
  if (hasZoomState) {
    const k = parseFloat(urlState.zk), zx = parseFloat(urlState.zx||0), zy = parseFloat(urlState.zy||0);
    if (isFinite(k) && isFinite(zx) && isFinite(zy)) {
      requestAnimationFrame(() => {
        const svgEl = document.getElementById('map');
        if (svgEl) d3.select(svgEl).call(zoom.transform, d3.zoomIdentity.translate(zx, zy).scale(k));
      });
    }
  }

  // First-run coach overlay
  const COACH_KEY = 'ge-onboarded-v1';
  if (!localStorage.getItem(COACH_KEY)) {
    showCoach();
  }
})();

function showCoach() {
  const steps = [
    { text: 'Click any node to inspect its details', icon: '👆' },
    { text: 'Double-click a selected node to focus on its neighbors', icon: '⊙' },
    { text: 'Use Search or click a legend color to filter', icon: '🔍' },
  ];
  let step = 0;
  const overlay = document.createElement('div');
  overlay.id = 'coachOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;';
  function renderStep() {
    const s = steps[step];
    const isLast = step === steps.length - 1;
    overlay.innerHTML = `<div style="background:var(--surface,#0d1420);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px 32px;max-width:380px;text-align:center;color:#e4ecf8;font-family:'DM Sans',sans-serif">
      <div style="font-size:32px;margin-bottom:12px">${s.icon}</div>
      <div style="font-size:15px;line-height:1.5;margin-bottom:16px">${s.text}</div>
      <div style="display:flex;gap:8px;justify-content:center;align-items:center">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:#6b85ae">${step+1} / ${steps.length}</span>
        <button id="coachNext" style="padding:6px 18px;border:none;border-radius:8px;background:#818cf8;color:#fff;font-size:13px;font-weight:600;cursor:pointer">${isLast ? 'Got it' : 'Next'}</button>
      </div>
    </div>`;
    document.getElementById('coachNext').onclick = () => {
      step++;
      if (step >= steps.length) {
        overlay.remove();
        try { localStorage.setItem('ge-onboarded-v1', '1'); } catch {}
      } else { renderStep(); }
    };
  }
  renderStep();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); try { localStorage.setItem('ge-onboarded-v1', '1'); } catch {} } });
  document.body.appendChild(overlay);
}
