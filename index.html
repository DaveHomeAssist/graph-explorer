<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Explorer — Dataset-Agnostic Node Graph Visualizer</title>
  <meta name="description" content="Graph Explorer is a dataset-agnostic node graph engine. Load any JSON map pack and explore relationships, filter by node type, and trace paths through the graph — no backend required." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://davehomeassist.github.io/graph-explorer/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://davehomeassist.github.io/graph-explorer/" />
  <meta property="og:title" content="Graph Explorer — Dataset-Agnostic Node Graph Visualizer" />
  <meta property="og:description" content="Load any JSON map pack and explore node relationships visually. Filter, trace paths, and inspect connections — runs entirely in the browser." />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Graph Explorer — Dataset-Agnostic Node Graph Visualizer" />
  <meta name="twitter:description" content="Load any JSON map pack and explore node relationships visually. Filter, trace paths, and inspect connections — runs entirely in the browser." />

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <style>
    :root {
      --bg:      #070b12;
      --surface: #0d1420;
      --panel:   #121c2c;
      --panel-2: #172236;
      --border:  rgba(255,255,255,0.07);
      --muted:   #6b85ae;
      --text:    #e4ecf8;
      --radius:  14px;
      --radius-sm: 9px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html, body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100%; }
    body { padding: 18px; }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      z-index: 10000;
      padding: 8px 16px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      background: #121c2c;
      color: #e4ecf8;
    }
    .skip-link:focus {
      left: 10px;
      top: 10px;
      outline: 2px solid currentColor;
    }

    .page { max-width: 1640px; margin: 0 auto; display: grid; gap: 14px; }

    .hero {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px 24px; display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(129,140,248,0.09); color: #a5b4fc;
      border: 1px solid rgba(129,140,248,0.2); border-radius: 999px;
      padding: 4px 12px; font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase; font-family: 'DM Mono', monospace;
    }

    h1 { margin: 10px 0 6px; font-size: clamp(22px, 3vw, 36px); font-weight: 800; letter-spacing: -0.02em; }
    .hero p { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 55ch; }

    .hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .stat {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; text-align: center;
    }
    .stat-val { font-size: 24px; font-weight: 800; font-family: 'DM Mono', monospace; }
    .stat-lbl { color: var(--muted); font-size: 10px; margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }

    .toolbar {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }

    .field {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 7px 11px; flex: 1; min-width: 140px;
    }
    .field label { display: block; font-size: 9.5px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
    .field input, .field select { width: 100%; background: transparent; border: 0; outline: 0; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .field select option { background: var(--panel); }
    .field:focus-within {
      border-color: rgba(129,140,248,0.4);
      box-shadow: 0 0 0 2px rgba(129,140,248,0.18);
    }

    .seg { display: flex; gap: 3px; background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; }
    .seg button {
      border: 0; background: transparent; color: var(--muted); padding: 6px 11px; border-radius: 7px;
      cursor: pointer; font-size: 11.5px; font-weight: 700; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all 130ms;
    }
    .seg button.active, .seg button:hover { background: rgba(129,140,248,0.14); color: var(--text); }
    .seg button:focus-visible,
    .icon-btn:focus-visible,
    .map-select:focus-visible,
    .path-clear:focus-visible,
    .path-target-select:focus-visible,
    .path-history-select:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(129,140,248,0.32);
      color: var(--text);
    }

    .icon-btn {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--muted); padding: 8px 14px; cursor: pointer; font-size: 11.5px; font-weight: 700;
      font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: color 130ms;
    }
    .icon-btn:hover { color: var(--text); }
    .icon-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .icon-btn:disabled:hover { color: var(--muted); }

    .main { display: grid; grid-template-columns: 1fr 290px; gap: 14px; align-items: start; }

    .canvas { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .canvas-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
    }

    .canvas-title { font-size: 13px; font-weight: 800; }
    .canvas-hint { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .legend { display: flex; flex-wrap: wrap; gap: 6px; }
    .legend-item { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 10.5px; font-family: 'DM Mono', monospace; }
    .dot { width: 7px; height: 7px; border-radius: 999px; }
    .legend-glyph {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 9px; font-weight: 700;
    }

    .map-wrap {
      overflow: hidden; cursor: grab; min-height: min(640px, 70vh); height: 72vh; position: relative;
      background:
        radial-gradient(circle at 15% 20%, rgba(129,140,248,0.07), transparent 35%),
        radial-gradient(circle at 82% 65%, rgba(52,211,153,0.05), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(251,146,60,0.04), transparent 30%),
        #070d18;
    }
    .map-wrap.panning { cursor: grabbing; }

    svg { display: block; width: 100%; }

    .edge { fill: none; stroke-width: 1.4; transition: opacity 200ms, stroke-width 200ms; }
    .edge.active { stroke-width: 2.2 !important; filter: drop-shadow(0 0 4px currentColor); }
    .edge.path-dim { opacity: 0.08; }
    .edge.path-hit { stroke: #818cf8 !important; stroke-width: 2.8 !important; stroke-dasharray: none !important; filter: drop-shadow(0 0 6px rgba(129,140,248,0.5)); }
    .node.path-dim { opacity: 0.1 !important; pointer-events: none; }
    .node.path-hit .bg { stroke: #818cf8 !important; stroke-width: 2 !important; filter: drop-shadow(0 0 10px rgba(129,140,248,0.4)); }
    .node.path-source .bg { stroke: #34d399 !important; stroke-width: 2.2 !important; filter: drop-shadow(0 0 12px rgba(52,211,153,0.5)); }
    .node.path-target .bg { stroke: #f59e0b !important; stroke-width: 2.2 !important; filter: drop-shadow(0 0 12px rgba(245,158,11,0.5)); }

    .node {
      cursor: pointer;
      transition: filter 140ms ease-out, opacity 140ms ease-out;
    }
    .node:hover { filter: drop-shadow(0 0 6px rgba(129,140,248,0.35)); }
    .node .bg {
      fill: rgba(12,19,33,0.96); stroke: rgba(255,255,255,0.09); stroke-width: 1;
      rx: 13; transition: stroke 140ms, filter 140ms;
    }
    .node:hover .bg { stroke: rgba(255,255,255,0.2); }
    .node:focus-visible .bg { stroke: rgba(129,140,248,0.75); }
    .node.selected .bg { stroke-width: 1.8; }
    .node.dimmed { opacity: 0.07 !important; pointer-events: none; }
    .node .heat-ring { fill: none; stroke-width: 6; opacity: 0; transition: opacity 300ms; }
    .node.heat-visible .heat-ring { opacity: 0.18; }
    .node .n-bar { rx: 999; }
    .node .n-type { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; font-weight: 500; }
    .node .n-glyph { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; font-weight: 700; }
    .node .n-name { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 800; fill: #e4ecf8; }
    .node .n-meta { font-family: 'DM Mono', monospace; font-size: 9.5px; fill: #6b85ae; }
    .node .n-degree { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; }

    .detail {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; position: sticky; top: 18px; max-height: calc(100vh - 36px); overflow-y: auto;
    }
    .detail::-webkit-scrollbar { width: 3px; }
    .detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

    .d-stack { display: grid; gap: 8px; }
    .d-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; }

    .d-kicker { font-family: 'DM Mono', monospace; font-size: 9.5px; color: #a5b4fc; letter-spacing: 0.07em; text-transform: uppercase; }
    .d-title { font-size: 17px; font-weight: 800; margin: 5px 0 7px; letter-spacing: -0.01em; line-height: 1.15; }
    .d-desc { color: var(--muted); font-size: 12.5px; line-height: 1.55; }

    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .chip {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); border-radius: 999px;
      padding: 3px 9px; font-size: 10.5px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace;
    }

    .kv { display: grid; grid-template-columns: 80px 1fr; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .kv:last-child { border: 0; }
    .kv .k { color: var(--muted); font-size: 11px; }
    .kv .v { font-weight: 600; }

    .d-list { margin: 6px 0 0 14px; }
    .d-list li { color: var(--muted); font-size: 12px; padding: 2px 0; line-height: 1.4; }
    .d-list li span { color: rgba(107,133,174,0.6); }

    .notion-link {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 9px;
      color: #818cf8; font-size: 11.5px; font-weight: 700; text-decoration: none; font-family: 'DM Mono', monospace;
    }
    .notion-link:hover { text-decoration: underline; }

    .impact-table { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-top: 6px; }
    .impact-table th {
      color: var(--muted); font-size: 10px; text-align: left; padding: 3px 6px; letter-spacing: 0.05em;
      font-family: 'DM Mono', monospace; text-transform: uppercase; border-bottom: 1px solid var(--border);
    }
    .impact-table td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .impact-table tr:last-child td { border: 0; }
    .impact-table .deg { font-family: 'DM Mono', monospace; font-weight: 700; text-align: right; }

    .error-banner {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius);
      padding: 16px 20px; color: #fca5a5; font-size: 13px; line-height: 1.5;
    }
    .error-banner strong { color: #ef4444; }
    .error-banner ul { margin: 8px 0 0 16px; }

    .status-card {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 24px 20px; text-align: center; color: var(--muted); font-size: 13px;
    }
    .status-card .status-icon { font-size: 28px; margin-bottom: 8px; }
    .status-card .status-title { font-weight: 700; color: var(--text); margin-bottom: 4px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: #818cf8; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }

    .map-select {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); padding: 7px 11px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .map-select option { background: var(--panel); }

    .path-bar {
      background: rgba(129,140,248,0.08); border: 1px solid rgba(129,140,248,0.2); border-radius: var(--radius);
      padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 12px;
    }
    .path-bar .path-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #a5b4fc; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
    .path-bar .path-chip {
      background: rgba(129,140,248,0.12); border: 1px solid rgba(129,140,248,0.25); border-radius: 999px;
      padding: 3px 10px; font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text);
    }
    .path-bar .path-chip.source { border-color: rgba(52,211,153,0.4); color: #34d399; }
    .path-bar .path-chip.target { border-color: rgba(245,158,11,0.4); color: #f59e0b; }
    .path-bar .path-arrow { color: var(--muted); font-size: 14px; }
    .path-bar .path-result { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }
    .path-bar .path-clear {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm);
      color: #ef4444; padding: 4px 10px; cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: 'DM Sans', sans-serif; margin-left: auto;
    }
    .path-bar .path-clear:hover { background: rgba(239,68,68,0.2); }
    .path-target-select {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); padding: 4px 8px; font-size: 11.5px; font-family: 'DM Sans', sans-serif; cursor: pointer; max-width: 200px;
    }
    .path-target-select option { background: var(--panel); }
    .path-history-select {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); padding: 4px 8px; font-size: 11.5px; font-family: 'DM Sans', sans-serif; cursor: pointer; max-width: 190px;
    }
    .path-history-select option { background: var(--panel); }
    .quality-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; color: var(--muted); font-size: 10.5px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .quality-badge.warn {
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.22);
      color: #fbbf24;
    }
    .warning-note {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .warning-note .d-list li { color: var(--text); }
    .warning-note .d-desc { color: var(--muted); }
    .map-empty {
      position: absolute; inset: 0; display: grid; place-items: center; padding: 24px;
      background: rgba(7,11,18,0.44); backdrop-filter: blur(4px); pointer-events: none;
    }
    .map-empty[hidden] { display: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    @media (max-width: 1100px) { .main { grid-template-columns: 1fr; } .detail { position: static; max-height: none; } }
    @media (max-width: 700px) { .hero { grid-template-columns: 1fr; } .hero-stats { grid-template-columns: repeat(2,1fr); } }

    @media (prefers-color-scheme: light) {
      html:not([data-theme]) {
        --bg:      #f0f2f7;
        --surface: #ffffff;
        --panel:   #f5f7fc;
        --panel-2: #edf0f8;
        --border:  rgba(0,0,0,0.08);
        --muted:   #6b7a99;
        --text:    #1a2238;
      }
      html:not([data-theme]), html:not([data-theme]) body { background: var(--bg); }
      html:not([data-theme]) .map-wrap {
        background:
          radial-gradient(circle at 15% 20%, rgba(129,140,248,0.06), transparent 35%),
          radial-gradient(circle at 82% 65%, rgba(52,211,153,0.04), transparent 35%),
          radial-gradient(circle at 50% 90%, rgba(251,146,60,0.03), transparent 30%),
          #e8ebf5;
      }
      html:not([data-theme]) .node .bg { fill: rgba(255,255,255,0.97); stroke: rgba(0,0,0,0.1); }
      html:not([data-theme]) .node:hover .bg { stroke: rgba(0,0,0,0.2); }
      html:not([data-theme]) .node .n-name { fill: #1a2238; }
      html:not([data-theme]) .node .n-meta { fill: #6b7a99; }
      html:not([data-theme]) .impact-table td { border-bottom-color: rgba(0,0,0,0.05); }
      html:not([data-theme]) .edge.path-dim { opacity: 0.1; }
      html:not([data-theme]) .edge.path-hit { stroke: #4f46e5 !important; filter: drop-shadow(0 0 4px rgba(79,70,229,0.35)); }
      html:not([data-theme]) .node.path-dim { opacity: 0.12 !important; }
      html:not([data-theme]) .node.path-hit .bg { stroke: #4f46e5 !important; filter: drop-shadow(0 0 8px rgba(79,70,229,0.25)); }
      html:not([data-theme]) .node.path-source .bg { stroke: #059669 !important; filter: drop-shadow(0 0 8px rgba(5,150,105,0.3)); }
      html:not([data-theme]) .node.path-target .bg { stroke: #d97706 !important; filter: drop-shadow(0 0 8px rgba(217,119,6,0.3)); }
      html:not([data-theme]) .path-bar { background: rgba(79,70,229,0.06); border-color: rgba(79,70,229,0.15); }
      html:not([data-theme]) .path-bar .path-label { color: #4f46e5; }
      html:not([data-theme]) .path-bar .path-chip { background: rgba(79,70,229,0.08); border-color: rgba(79,70,229,0.2); }
      html:not([data-theme]) .path-bar .path-chip.source { border-color: rgba(5,150,105,0.3); color: #059669; }
      html:not([data-theme]) .path-bar .path-chip.target { border-color: rgba(217,119,6,0.3); color: #d97706; }
      /* Light mode fixes — contrast and visibility */
      html:not([data-theme]) .eyebrow { background: rgba(79,70,229,0.08); color: #4338ca; }
      html:not([data-theme]) .chip { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: var(--text); }
      html:not([data-theme]) .d-kicker { color: #4338ca; }
      html:not([data-theme]) .notion-link { color: #4338ca; }
      html:not([data-theme]) .d-list li span { color: rgba(0,0,0,0.45); }
      html:not([data-theme]) .detail::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
      html:not([data-theme]) .node.dimmed { opacity: 0.18 !important; }
      html:not([data-theme]) .seg button.active,
      html:not([data-theme]) .seg button:hover { background: rgba(79,70,229,0.1); }
      html:not([data-theme]) .quality-badge { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
      html:not([data-theme]) .quality-badge.warn { background: rgba(217,119,6,0.1); border-color: rgba(217,119,6,0.18); color: #b45309; }
      html:not([data-theme]) .warning-note { background: rgba(217,119,6,0.08); border-color: rgba(217,119,6,0.18); }
      html:not([data-theme]) .map-empty { background: rgba(240,242,247,0.68); }
    }

    html[data-theme='light'] {
      --bg:      #f0f2f7;
      --surface: #ffffff;
      --panel:   #f5f7fc;
      --panel-2: #edf0f8;
      --border:  rgba(0,0,0,0.08);
      --muted:   #6b7a99;
      --text:    #1a2238;
    }
    html[data-theme='light'], html[data-theme='light'] body { background: var(--bg); }
    html[data-theme='light'] .map-wrap {
      background:
        radial-gradient(circle at 15% 20%, rgba(129,140,248,0.06), transparent 35%),
        radial-gradient(circle at 82% 65%, rgba(52,211,153,0.04), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(251,146,60,0.03), transparent 30%),
        #e8ebf5;
    }
    html[data-theme='light'] .node .bg { fill: rgba(255,255,255,0.97); stroke: rgba(0,0,0,0.1); }
    html[data-theme='light'] .node:hover .bg { stroke: rgba(0,0,0,0.2); }
    html[data-theme='light'] .node .n-name { fill: #1a2238; }
    html[data-theme='light'] .node .n-meta { fill: #6b7a99; }

  </style>

<script type="module">
import { validateDataset } from './engine/validate.js';

// ── Constants ────────────────────────────────────────────────────────────────
const SUPPORTED_SCHEMA_VERSIONS = [1];
const MANIFEST_PATH = 'maps/manifest.json';
const DEFAULT_PRESENTATION_PATH = 'maps/default-presentation.json';
const NW = 220;
const NH = 88;
const THEME_KEY = 'graph-explorer-theme';
const MAP_STATE_KEY = 'ge-map-states-v1';
const PATH_HISTORY_KEY = 'ge-path-history-v1';
const UNDO_LIMIT = 10;

// ── Graph State ──────────────────────────────────────────────────────────────
let manifest = null;
let nodes = [];
let edges = [];
let presentation = {};
let layers = {};
let nodeMap = {};
let adjacency = {};
let degree = {};
let maxDegree = 0;
let currentMapId = null;
let validationWarnings = [];
let pathHistory = [];
let undoStack = [];
let redoStack = [];
let historySuspend = false;
let lastRecordedPathKey = '';

const state = {
  search: '',
  layer: 'All',
  focus: 'All',
  selectedId: null,
  focusNode: null,
  heatmap: false,
  pathMode: false,
  pathTarget: null,
};

// ── Accessibility: Live Region Announcer ─────────────────────────────────────
function announce(msg) {
  const el = document.getElementById('announce');
  if (!el) return;
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = msg; });
}

// ── Path State (derived) ─────────────────────────────────────────────────────
let pathNodeIds = new Set();
let pathEdgeKeys = new Set();  // "from→to" keys
let pathSteps = [];            // ordered node IDs in the path

function safeReadJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' ? parsed : fallback;
  } catch {
    return fallback;
  }
}

function safeWriteJson(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

function snapshotState() {
  return {
    search: state.search,
    layer: state.layer,
    focus: state.focus,
    selectedId: state.selectedId,
    focusNode: state.focusNode,
    heatmap: state.heatmap,
    pathMode: state.pathMode,
    pathTarget: state.pathTarget,
  };
}

function syncControlsFromState() {
  const searchEl = document.getElementById('search');
  const layerEl = document.getElementById('layerF');
  const heatBtn = document.getElementById('heatBtn');
  const pathBtn = document.getElementById('pathBtn');
  if (searchEl) searchEl.value = state.search || '';
  if (layerEl) layerEl.value = state.layer || 'All';
  if (heatBtn) heatBtn.textContent = state.heatmap ? '🌡 Heatmap ON' : '🌡 Heatmap';
  if (pathBtn) pathBtn.textContent = state.pathMode ? '⤳ Path ON' : '⤳ Path';
}

function updateUndoButtons() {
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  if (undoBtn) undoBtn.disabled = undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
}

function pushUndoSnapshot() {
  if (historySuspend || !currentMapId) return;
  const next = { mapId: currentMapId, state: snapshotState() };
  const last = undoStack[undoStack.length - 1];
  if (last && JSON.stringify(last) === JSON.stringify(next)) return;
  undoStack.push(next);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}

function restoreStateSnapshot(entry) {
  if (!entry || entry.mapId !== currentMapId || !entry.state) return;
  historySuspend = true;
  Object.assign(state, entry.state);
  syncControlsFromState();
  layoutCache = null;
  historySuspend = false;
  render(false);
  updateUndoButtons();
}

function performUndo() {
  if (!undoStack.length) return;
  const entry = undoStack.pop();
  redoStack.push({ mapId: currentMapId, state: snapshotState() });
  restoreStateSnapshot(entry);
}

function performRedo() {
  if (!redoStack.length) return;
  const entry = redoStack.pop();
  undoStack.push({ mapId: currentMapId, state: snapshotState() });
  restoreStateSnapshot(entry);
}

function readMapBookmarks() {
  return safeReadJson(MAP_STATE_KEY, {});
}

function writeMapBookmark() {
  if (!currentMapId) return;
  const bookmarks = readMapBookmarks();
  bookmarks[currentMapId] = snapshotState();
  safeWriteJson(MAP_STATE_KEY, bookmarks);
}

function restoreMapBookmark(mapId) {
  const bookmarks = readMapBookmarks();
  const entry = bookmarks[mapId];
  if (!entry) return false;
  Object.assign(state, {
    search: entry.search || '',
    layer: entry.layer || 'All',
    focus: entry.focus || 'All',
    selectedId: nodeMap[entry.selectedId] ? entry.selectedId : (nodes[0]?.id || null),
    focusNode: nodeMap[entry.focusNode] ? entry.focusNode : null,
    heatmap: !!entry.heatmap,
    pathMode: !!entry.pathMode,
    pathTarget: nodeMap[entry.pathTarget] ? entry.pathTarget : null,
  });
  syncControlsFromState();
  return true;
}

function loadPathHistory() {
  const stored = safeReadJson(PATH_HISTORY_KEY, []);
  pathHistory = Array.isArray(stored) ? stored : [];
}

function savePathHistory() {
  safeWriteJson(PATH_HISTORY_KEY, pathHistory);
}

function recordPathHistory() {
  if (!currentMapId || !state.pathMode || !state.selectedId || !state.pathTarget || pathSteps.length < 2) return;
  const key = `${currentMapId}:${state.selectedId}:${state.pathTarget}`;
  if (lastRecordedPathKey === key) return;
  lastRecordedPathKey = key;
  const source = nodeMap[state.selectedId];
  const target = nodeMap[state.pathTarget];
  pathHistory = [
    {
      key,
      mapId: currentMapId,
      selectedId: state.selectedId,
      pathTarget: state.pathTarget,
      label: `${source?.label || state.selectedId} → ${target?.label || state.pathTarget}`,
      timestamp: new Date().toISOString(),
    },
    ...pathHistory.filter((entry) => entry.key !== key),
  ].slice(0, 5);
  savePathHistory();
}

function updatePathHistorySelect() {
  const select = document.getElementById('pathHistorySelect');
  if (!select) return;
  const items = pathHistory.filter((entry) => entry.mapId === currentMapId);
  select.innerHTML = '<option value="">Recent paths…</option>';
  items.forEach((entry) => {
    const option = document.createElement('option');
    option.value = entry.key;
    option.textContent = entry.label;
    select.appendChild(option);
  });
  select.value = '';
}

// ── URL State Sync ───────────────────────────────────────────────────────────
function readStateFromUrl() {
  const p = new URLSearchParams(location.search);
  return {
    map:   p.get('map')   || null,
    node:  p.get('node')  || null,
    layer: p.get('layer') || null,
    focus: p.get('focus') || null,
    heat:  p.get('heat')  || null,
    q:     p.get('q')     || null,
    theme: p.get('theme') || null,
    path:  p.get('path')  || null,
  };
}

let urlWriteTimer = null;
function writeStateToUrl() {
  clearTimeout(urlWriteTimer);
  urlWriteTimer = setTimeout(() => {
    const url = new URL(location);
    const sp = url.searchParams;

    // Always write map
    if (currentMapId) sp.set('map', currentMapId);

    // Only write non-default state
    if (state.selectedId) sp.set('node', state.selectedId); else sp.delete('node');
    if (state.layer !== 'All') sp.set('layer', state.layer); else sp.delete('layer');
    if (state.focus !== 'All') sp.set('focus', state.focus); else sp.delete('focus');
    if (state.heatmap) sp.set('heat', '1'); else sp.delete('heat');
    if (state.search) sp.set('q', state.search); else sp.delete('q');
    if (state.pathMode && state.pathTarget) sp.set('path', `${state.selectedId},${state.pathTarget}`); else sp.delete('path');

    // Theme from attribute
    const theme = document.documentElement.getAttribute('data-theme');
    if (theme) sp.set('theme', theme); else sp.delete('theme');

    history.replaceState(null, '', url);
  }, 200);
}

// ── Path Finding (BFS) ───────────────────────────────────────────────────────
function findShortestPath(fromId, toId) {
  if (!fromId || !toId || fromId === toId) return [fromId].filter(Boolean);
  const visited = new Set([fromId]);
  const parent = { [fromId]: null };
  const queue = [fromId];

  while (queue.length) {
    const current = queue.shift();
    if (current === toId) {
      // Reconstruct path
      const path = [];
      let node = toId;
      while (node !== null) {
        path.unshift(node);
        node = parent[node];
      }
      return path;
    }
    const neighbors = adjacency[current] || new Set();
    for (const nbr of neighbors) {
      if (!visited.has(nbr)) {
        visited.add(nbr);
        parent[nbr] = current;
        queue.push(nbr);
      }
    }
  }
  return []; // no path found
}

function computePathHighlights() {
  pathNodeIds = new Set();
  pathEdgeKeys = new Set();
  pathSteps = [];

  if (!state.pathMode || !state.selectedId || !state.pathTarget) return;

  const steps = findShortestPath(state.selectedId, state.pathTarget);
  if (!steps.length) return;

  pathSteps = steps;
  steps.forEach(id => pathNodeIds.add(id));

  // Build edge keys for both directions (graph is undirected in adjacency)
  for (let i = 0; i < steps.length - 1; i++) {
    pathEdgeKeys.add(`${steps[i]}→${steps[i+1]}`);
    pathEdgeKeys.add(`${steps[i+1]}→${steps[i]}`);
  }
}

function updatePathBar() {
  const bar = document.getElementById('pathBar');
  const sourceEl = document.getElementById('pathSource');
  const resultEl = document.getElementById('pathResult');
  const targetSel = document.getElementById('pathTargetSelect');
  const historySel = document.getElementById('pathHistorySelect');

  if (!state.pathMode) {
    bar.style.display = 'none';
    if (historySel) historySel.value = '';
    return;
  }
  bar.style.display = 'flex';

  // Source chip
  const srcNode = state.selectedId ? nodeMap[state.selectedId] : null;
  sourceEl.textContent = srcNode ? srcNode.label : '—';

  // Target dropdown — populate with all nodes except source
  const currentTarget = targetSel.value;
  targetSel.innerHTML = '<option value="">Select target…</option>';
  [...nodes].sort((a, b) => a.label.localeCompare(b.label)).forEach(n => {
    if (n.id === state.selectedId) return;
    const opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = n.label;
    if (n.id === state.pathTarget) opt.selected = true;
    targetSel.appendChild(opt);
  });

  // Result text
  if (!state.pathTarget) {
    resultEl.textContent = '';
  } else if (pathSteps.length > 0) {
    const summary = `${pathSteps.length - 1} hop${pathSteps.length - 1 !== 1 ? 's' : ''} · ${pathSteps.length} nodes`;
    resultEl.textContent = summary;
    announce(`Path found: ${summary}`);
  } else {
    resultEl.textContent = 'No path found';
    announce('No path found between selected nodes');
  }
  updatePathHistorySelect();
}

// ── Status Display ───────────────────────────────────────────────────────────
function showStatus(icon, title, message) {
  const wrap = document.getElementById('mapWrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="status-card" style="margin:40px auto;max-width:400px">
    <div class="status-icon">${icon}</div>
    <div class="status-title">${esc(title)}</div>
    <div>${esc(message)}</div>
  </div>`;
}

function showLoading(message) {
  const wrap = document.getElementById('mapWrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="status-card" style="margin:40px auto;max-width:400px">
    <div><span class="spinner"></span></div>
    <div class="status-title" style="margin-top:10px">${esc(message)}</div>
  </div>`;
}

function showError(title, errors, warnings) {
  const panel = document.getElementById('detailPanel');
  if (panel) panel.innerHTML = '';
  validationWarnings = warnings || [];
  const wrap = document.getElementById('mapWrap');
  if (!wrap) return;
  const w = warnings || [];
  wrap.innerHTML = `<div class="error-banner" style="margin:20px">
    <strong>${esc(title)}</strong>
    <ul>${errors.map(e => `<li>${esc(e)}</li>`).join('')}</ul>
    ${w.length ? `<br/><strong>Warnings:</strong><ul>${w.map(e => `<li>${esc(e)}</li>`).join('')}</ul>` : ''}
  </div>`;
}

// ── Manifest Loader ──────────────────────────────────────────────────────────
async function loadManifest() {
  showLoading('Loading map registry…');
  try {
    const res = await fetch(MANIFEST_PATH);
    if (!res.ok) throw new Error(`Failed to load ${MANIFEST_PATH} (${res.status})`);
    const data = await res.json();

    if (!data.version || !SUPPORTED_SCHEMA_VERSIONS.includes(data.version)) {
      showError('Manifest Error', [`Unsupported manifest version ${data.version || '(missing)'}. Supported: ${SUPPORTED_SCHEMA_VERSIONS.join(', ')}.`]);
      return null;
    }
    if (!Array.isArray(data.maps) || !data.maps.length) {
      showError('Manifest Error', ['Manifest contains no maps.']);
      return null;
    }
    manifest = data;
    return data;
  } catch (err) {
    showError('Manifest Load Failed', [err.message]);
    return null;
  }
}

// ── Dataset Loader ───────────────────────────────────────────────────────────
function getMapEntry(mapOrId) {
  if (typeof mapOrId === 'object' && mapOrId) return mapOrId;
  return manifest?.maps?.find((entry) => entry.id === mapOrId) || null;
}

function getMapLabel(entry) {
  return entry?.title || entry?.name || entry?.id || 'map';
}

function getDatasetPath(entry) {
  return entry?.file || `maps/${entry.id}/dataset.json`;
}

function getPresentationPath(entry) {
  if (entry?.presentation) return entry.presentation;
  if (entry?.file) {
    const lastSlash = entry.file.lastIndexOf('/');
    return lastSlash >= 0
      ? `${entry.file.slice(0, lastSlash)}/presentation.json`
      : 'presentation.json';
  }
  return `maps/${entry.id}/presentation.json`;
}

async function loadMapPack(mapOrId) {
  const entry = getMapEntry(mapOrId);
  if (!entry) {
    showError('Map Load Failed', [`Unknown map "${esc(String(mapOrId || ''))}".`]);
    return false;
  }

  const datasetPath = getDatasetPath(entry);
  const presentationPath = getPresentationPath(entry);
  showLoading(`Loading ${getMapLabel(entry)}…`);

  try {
    const [dataRes, initialPresRes] = await Promise.all([
      fetch(datasetPath),
      fetch(presentationPath),
    ]);

    if (!dataRes.ok) throw new Error(`Failed to load ${datasetPath} (${dataRes.status})`);

    let presRes = initialPresRes;
    if (!presRes.ok) {
      if (presRes.status !== 404) {
        throw new Error(`Failed to load ${presentationPath} (${presRes.status})`);
      }
      presRes = await fetch(DEFAULT_PRESENTATION_PATH);
      if (!presRes.ok) {
        throw new Error(`Failed to load ${presentationPath} (${initialPresRes.status}) and fallback ${DEFAULT_PRESENTATION_PATH} (${presRes.status})`);
      }
    }

    const dataset = await dataRes.json();
    const pres = await presRes.json();

    // Validate
    const result = validateDataset(dataset);
    if (!result.valid) {
      showError('Dataset Validation Failed', result.errors, result.warnings);
      return false;
    }
    validationWarnings = result.warnings.slice();

    // Install data
    currentMapId = entry.id;
    lastRecordedPathKey = '';
    undoStack = [];
    redoStack = [];
    updateUndoButtons();
    nodes = dataset.nodes;
    edges = dataset.edges;
    presentation = pres;
    layers = pres.layers || {};

    // Build derived indexes
    nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    adjacency = {};
    edges.forEach(({ from, to }) => {
      adjacency[from] ??= new Set();
      adjacency[to] ??= new Set();
      adjacency[from].add(to);
      adjacency[to].add(from);
    });
    degree = {};
    nodes.forEach(n => { degree[n.id] = 0; });
    edges.forEach(({ from, to }) => { degree[from]++; degree[to]++; });
    maxDegree = Math.max(1, ...Object.values(degree));

    // Apply presentation defaults
    const defaults = pres.defaults || {};
    const defaultFocus = defaults.initialFocusMode || 'All';
    const defaultLayer = defaults.initialLayer || 'All';
    const defaultHeatmap = defaults.showHeatmap || false;

    // Reset state (URL overrides applied after)
    Object.assign(state, {
      search: '',
      layer: defaultLayer,
      focus: defaultFocus,
      selectedId: nodes[0]?.id || null,
      focusNode: null,
      heatmap: defaultHeatmap,
      pathMode: false,
      pathTarget: null,
    });
    syncControlsFromState();
    layoutCache = null;
    restoreMapBookmark(entry.id);

    // Apply presentation chrome
    document.getElementById('eyebrow').textContent = '🗂 ' + (pres.eyebrow || 'Graph Explorer');
    document.getElementById('heroTitle').textContent = pres.title || 'Graph Explorer';
    document.getElementById('heroDesc').textContent = pres.description || '';
    document.title = (pres.title || 'Graph Explorer') + ' — Graph Explorer';
    announce(`Map loaded: ${pres.title || 'Graph Explorer'}`);

    // Restore SVG structure (in case status cards replaced it)
    restoreCanvas();

    setupLegend();
    setupEdgeLegend();
    setupMarkers();
    populateSelect('layerF', nodes.map(n => n.layer));

    return true;
  } catch (err) {
    showError('Map Load Failed', [err.message]);
    return false;
  }
}

function restoreCanvas() {
  const wrap = document.getElementById('mapWrap');
  if (wrap.querySelector('#map')) return; // SVG still there
  wrap.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'map';
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'Graph explorer system map');

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.id = 'markerDefs';
  svg.appendChild(defs);

  const zg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  zg.id = 'zoomGroup';
  const eg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  eg.id = 'edgeGroup';
  const ng = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  ng.id = 'nodeGroup';
  zg.appendChild(eg);
  zg.appendChild(ng);
  svg.appendChild(zg);
  wrap.appendChild(svg);

  const empty = document.createElement('div');
  empty.id = 'mapEmpty';
  empty.className = 'map-empty';
  empty.hidden = true;
  empty.innerHTML = `<div class="status-card" style="margin:0;max-width:420px">
    <div class="status-icon">🔎</div>
    <div class="status-title">No nodes match these filters</div>
    <div>Adjust search, layer, or focus mode to bring the graph back into view.</div>
  </div>`;
  wrap.appendChild(empty);

  // Re-bind D3 zoom
  d3.select(svg).call(zoom);
  // Re-bind node keyboard handler
  ng.addEventListener('keydown', handleNodeKeydown);
  ng.onclick = handleNodeClick;
}

function getNodeAccent(node) {

}

// ── Theme ────────────────────────────────────────────────────────────────────
function getInitialTheme() {
  // URL param takes priority
  const urlTheme = readStateFromUrl().theme;
  if (urlTheme === 'light' || urlTheme === 'dark') return urlTheme;
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'light' || saved === 'dark') return saved;
  } catch {}
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'light' ? '☀ Light' : '🌙 Dark';
}

// ── Layout ───────────────────────────────────────────────────────────────────
let layoutCache = null;

function computeLayout(visibleIds) {
  const key = [...visibleIds].sort().join(',');
  if (layoutCache?.key === key) return layoutCache.positions;

  if (!visibleIds.size) {
    layoutCache = { key, positions: {}, w: 800, h: 520, offX: 0, offY: 0 };
    return layoutCache.positions;
  }

  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: 'TB', ranksep: 30, nodesep: 12, marginx: 12, marginy: 12 });
  g.setDefaultEdgeLabel(() => ({}));

  visibleIds.forEach(id => g.setNode(id, { width: NW, height: NH }));
  edges.forEach(({ from, to }) => {
    if (visibleIds.has(from) && visibleIds.has(to)) g.setEdge(from, to);
  });

  dagre.layout(g);

  const positions = {};
  visibleIds.forEach(id => {
    const n = g.node(id);
    if (!n) return;
    positions[id] = { x: n.x - NW / 2, y: n.y - NH / 2 };
  });

  if (!Object.keys(positions).length) {
    layoutCache = { key, positions: {}, w: 800, h: 520, offX: 0, offY: 0 };
    return layoutCache.positions;
  }

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  Object.values(positions).forEach(({ x, y }) => {
    minX = Math.min(minX, x);
    minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + NW);
    maxY = Math.max(maxY, y + NH);
  });

  layoutCache = { key, positions, w: maxX - minX + 60, h: maxY - minY + 60, offX: minX - 30, offY: minY - 30 };
  return positions;
}

// ── D3 Zoom ──────────────────────────────────────────────────────────────────
const mapWrap = document.getElementById('mapWrap');

const zoom = d3.zoom().scaleExtent([0.35, 6]).on('zoom', e => {
  const zg = document.getElementById('zoomGroup');
  if (zg) zg.setAttribute('transform', e.transform);
});

d3.select(document.getElementById('map')).call(zoom);
mapWrap.addEventListener('mousedown', () => mapWrap.classList.add('panning'));
window.addEventListener('mouseup', () => mapWrap.classList.remove('panning'));
window.addEventListener('blur', () => mapWrap.classList.remove('panning'));
mapWrap.addEventListener('mouseleave', () => mapWrap.classList.remove('panning'));

function fitToView(w, h) {
  const svgEl = document.getElementById('map');
  if (!svgEl) return;
  const ww = mapWrap.clientWidth || 900;
  const wh = mapWrap.clientHeight || 640;
  svgEl.setAttribute('viewBox', `0 0 ${ww} ${wh}`);
  svgEl.setAttribute('height', wh);

  const fitScale = Math.min(ww / w, wh / h);
  let scale = fitScale * 2.4;
  scale = Math.max(0.85, Math.min(2.2, scale));

  const tx = (ww - w * scale) / 2;
  const ty = (wh - h * scale) / 2;
  d3.select(svgEl).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Filtering ────────────────────────────────────────────────────────────────
function getVisibleIds() {
  const focusModes = presentation.focusModes || [];
  const activeMode = focusModes.find(m => m.id === state.focus);

  let base = nodes.filter(n => {
    const tags = n.meta?.tags || [];
    const hay = [n.label, n.layer, n.type, ...tags].join(' ').toLowerCase();
    if (state.search && !hay.includes(state.search.toLowerCase())) return false;
    if (state.layer !== 'All' && n.layer !== state.layer) return false;

    if (activeMode?.filter) {
      const f = activeMode.filter;
      const byId = f.ids ? f.ids.includes(n.id) : false;
      const byLayer = f.layers ? f.layers.includes(n.layer) : false;
      if (f.ids && f.layers) return byId || byLayer;
      if (f.ids) return byId;
      if (f.layers) return byLayer;
    }
    return true;
  });

  if (state.focusNode) {
    const nbrs = adjacency[state.focusNode] || new Set();
    const focusIds = new Set([state.focusNode, ...nbrs]);
    base = nodes.filter(n => focusIds.has(n.id));
  }

  return new Set(base.map(n => n.id));
}

// ── Render: Focus Modes ──────────────────────────────────────────────────────
function renderFocusModes() {
  const modes = presentation.focusModes || [{ id: 'All', label: 'All' }];
  const el = document.getElementById('focusModes');
  el.innerHTML = '';
  modes.forEach(m => {
    const b = document.createElement('button');
    b.textContent = m.label;
    if (state.focus === m.id) b.classList.add('active');
    b.onclick = () => {
      pushUndoSnapshot();
      state.focus = m.id;
      state.focusNode = null;
      layoutCache = null;
      render();
    };
    el.appendChild(b);
  });
}

// ── Render: Stats ────────────────────────────────────────────────────────────
function renderStats(visIds) {
  const vis = [...visIds].map(id => nodeMap[id]);
  const statsConfig = presentation.stats || [{ label: 'Visible', count: 'visible' }];

  document.getElementById('heroStats').innerHTML = statsConfig.map(s => {
    let count;
    if (s.count === 'visible') {
      count = vis.length;
    } else if (s.filter) {
      count = vis.filter(n => {
        if (s.filter.layer) return n.layer === s.filter.layer;
        if (s.filter.layers) return s.filter.layers.includes(n.layer);
        return false;
      }).length;
    } else {
      count = 0;
    }
    return `<div class="stat"><div class="stat-val">${count}</div><div class="stat-lbl">${esc(s.label)}</div></div>`;
  }).join('');
}

// ── Render: Map ──────────────────────────────────────────────────────────────
function renderMap(visIds) {
  computeLayout(visIds);
  const positions = layoutCache.positions;
  const { offX, offY } = layoutCache;
  const edgeStyles = presentation.edgeStyles || {};

  const edgeGrp = document.getElementById('edgeGroup');
  const nodeGrp = document.getElementById('nodeGroup');
  if (!edgeGrp || !nodeGrp) return;
  edgeGrp.innerHTML = '';
  nodeGrp.innerHTML = '';

  const svgEl = document.getElementById('map');
  const emptyEl = document.getElementById('mapEmpty');
  const ww = mapWrap.clientWidth || 900;
  const wh = mapWrap.clientHeight || 640;
  svgEl.setAttribute('viewBox', `0 0 ${ww} ${wh}`);
  svgEl.setAttribute('height', wh);
  if (emptyEl) emptyEl.hidden = visIds.size > 0;

  if (!visIds.size) {
    document.getElementById('canvasTitle').textContent = 'No matching nodes';
    announce('No matching nodes for current filter');
    return;
  }

  edges.forEach(({ from, to, type }) => {
    if (!visIds.has(from) || !visIds.has(to)) return;
    const ps = positions[from];
    const pt = positions[to];
    if (!ps || !pt) return;
    const x1 = ps.x - offX + NW / 2;
    const y1 = ps.y - offY + NH;
    const x2 = pt.x - offX + NW / 2;
    const y2 = pt.y - offY;
    const my = (y1 + y2) / 2;
    const active = state.selectedId === from || state.selectedId === to;
    const style = edgeStyles[type] || { stroke: 'rgba(120,145,190,0.35)' };

    const isPathEdge = state.pathMode && state.pathTarget && (pathEdgeKeys.has(`${from}→${to}`) || pathEdgeKeys.has(`${to}→${from}`));
    const isPathDim = state.pathMode && state.pathTarget && pathSteps.length > 0 && !isPathEdge;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1} ${y1} C${x1} ${my},${x2} ${my},${x2} ${y2}`);
    path.setAttribute('class', `edge${active ? ' active' : ''}${isPathEdge ? ' path-hit' : ''}${isPathDim ? ' path-dim' : ''}`);
    path.setAttribute('stroke', style.stroke);
    if (style.dasharray && !isPathEdge) path.setAttribute('stroke-dasharray', style.dasharray);
    path.setAttribute('marker-end', `url(#arr-${type})`);
    edgeGrp.appendChild(path);
  });

  nodes.forEach(n => {
    const vis = visIds.has(n.id);
    const pos = positions[n.id];
    if (!pos) return;
    const px = pos.x - offX;
    const py = pos.y - offY;
    const col = getNodeAccent(n);
    const glyph = getNodeGlyph(n);
    const deg = degree[n.id];
    const heat = state.heatmap ? (deg / maxDegree) : 0;
    const heatCol = heat > 0.6 ? '#ef4444' : heat > 0.35 ? '#f59e0b' : '#38bdf8';
    const tags = n.meta?.tags || [];
    const risks = n.meta?.risks || [];

    const isPathNode = state.pathMode && state.pathTarget && pathNodeIds.has(n.id);
    const isPathDimNode = state.pathMode && state.pathTarget && pathSteps.length > 0 && !isPathNode;
    const isPathSrc = state.pathMode && n.id === state.selectedId && state.pathTarget;
    const isPathTgt = state.pathMode && n.id === state.pathTarget;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', `node${n.id === state.selectedId ? ' selected' : ''}${!vis ? ' dimmed' : ''}${state.heatmap ? ' heat-visible' : ''}${isPathSrc ? ' path-source' : ''}${isPathTgt ? ' path-target' : ''}${isPathNode && !isPathSrc && !isPathTgt ? ' path-hit' : ''}${isPathDimNode ? ' path-dim' : ''}`);
    g.setAttribute('data-id', n.id);
    g.setAttribute('transform', `translate(${px},${py})`);
    g.setAttribute('tabindex', vis ? 0 : -1);
    if (vis) {
      g.setAttribute('role', 'button');
      g.setAttribute('aria-label', n.label);
    }

    const selGlow = n.id === state.selectedId ? `filter:drop-shadow(0 0 14px ${col}44)` : '';
    const displayName = n.label.length > 27 ? n.label.slice(0, 26) + '…' : n.label;
    g.innerHTML = `
      <circle class="heat-ring" cx="${NW/2}" cy="${NH/2}" r="${Math.max(NW,NH)*0.6}" stroke="${heatCol}"/>
      <rect class="bg" width="${NW}" height="${NH}" rx="13" style="${n.id===state.selectedId?`stroke:${col};${selGlow}`:''}"/>
      <rect class="n-bar" x="13" y="12" width="36" height="5" fill="${col}" opacity="0.85"/>
      <text class="n-type" x="13" y="28" fill="${col}">${esc(n.type)}</text>
      ${glyph ? `<text class="n-glyph" x="${NW-13}" y="28" text-anchor="end" fill="${col}">${esc(glyph)}</text>` : ''}
      <text class="n-name" x="13" y="48">${esc(displayName)}</text>
      <text class="n-meta" x="13" y="64">${esc(n.layer)} · ${esc(n.status || '')}</text>
      <text class="n-meta" x="13" y="78">${tags.slice(0,2).map(t=>'#'+t).join('  ')}</text>
      ${state.heatmap ? `<text class="n-degree" x="${NW-12}" y="16" text-anchor="end" fill="${heatCol}">${deg}↔</text>` : ''}
      ${risks.length ? `<text class="n-degree" x="${NW-12}" y="${state.heatmap ? 30 : 16}" text-anchor="end" fill="#f59e0b">!${risks.length}</text>` : ''}
    `;
    if (vis) {
      const baseY = py;
      g.addEventListener('mouseenter', () => { g.setAttribute('transform', `translate(${px},${baseY - 4})`); });
      g.addEventListener('mouseleave', () => { g.setAttribute('transform', `translate(${px},${baseY})`); });
    }
    nodeGrp.appendChild(g);
  });

  const canvasLabel = state.focusNode ? `Focus: ${nodeMap[state.focusNode].label}` :
    state.focus !== 'All' ? state.focus : (presentation.title || 'Full Topology');
  document.getElementById('canvasTitle').textContent = canvasLabel;
  announce(`Showing ${visIds.size} node${visIds.size !== 1 ? 's' : ''} — ${canvasLabel}`);
}

// ── Node event handlers (shared between initial and restored SVG) ────────────
function handleNodeClick(e) {
  const g = e.target.closest('.node:not(.dimmed)');
  if (!g) return;
  const id = g.dataset.id;
  if (state.selectedId === id) {
    state.focusNode = state.focusNode === id ? null : id;
    layoutCache = null;
  }
  state.selectedId = id;
  render(false);
}

function handleNodeKeydown(e) {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const g = e.target.closest('g[data-id]');
  if (!g) return;
  e.preventDefault();
  const id = g.dataset.id;
  if (state.selectedId === id) {
    state.focusNode = state.focusNode === id ? null : id;
    layoutCache = null;
  }
  state.selectedId = id;
  render(false);
}

// ── Render: Detail Panel (Dataset-Agnostic) ──────────────────────────────────
function renderDetail(visIds) {
  const panel = document.getElementById('detailPanel');
  if (!visIds.size) {
    panel.innerHTML = `<div class="d-card">
      <div class="status-icon" style="font-size:22px;margin-bottom:6px">🔍</div>
      <div class="d-kicker">No results</div>
      <p class="d-desc" style="margin-top:6px">No nodes match the current filters. Try adjusting search, layer, or focus mode.</p>
    </div>`;
    return;
  }

  if (!visIds.has(state.selectedId)) state.selectedId = [...visIds][0];
  const n = nodeMap[state.selectedId];
  const col = layers[n.layer] || '#818cf8';
  const meta = n.meta || {};
  const inbound = edges.filter(e => e.to === n.id).map(e => nodeMap[e.from]).filter(Boolean);
  const outbound = edges.filter(e => e.from === n.id).map(e => nodeMap[e.to]).filter(Boolean);

  const inspectorCfg = presentation.inspector || {};
  const fields = inspectorCfg.fields || [{ key: 'type', label: 'Type' }, { key: 'layer', label: 'Layer' }];
  const fieldOrder = inspectorCfg.fieldOrder || null;
  const metaArrays = inspectorCfg.metaArrays || [];
  const metaChips = inspectorCfg.metaChips || [];
  const metaLink = inspectorCfg.metaLink;
  const metaFieldsDef = inspectorCfg.metaFields || [];

  // Field cards — support custom ordering
  let orderedFields = fields;
  if (fieldOrder) {
    const fieldMap = Object.fromEntries(fields.map(f => [f.key, f]));
    orderedFields = fieldOrder.map(k => fieldMap[k]).filter(Boolean);
    fields.forEach(f => { if (!fieldOrder.includes(f.key)) orderedFields.push(f); });
  }

  const kvHtml = orderedFields.map(f => {
    const val = n[f.key] || meta[f.key] || '';
    if (!val) return ''; // hide empty fields
    return `<div class="kv"><div class="k">${esc(f.label)}</div><div class="v">${esc(val)}</div></div>`;
  }).filter(Boolean).join('') + `<div class="kv"><div class="k">Degree</div><div class="v">${degree[n.id]} connections</div></div>`;

  // Meta arrays — hide sections with no data and no emptyText
  const arraysHtml = metaArrays.map(cfg => {
    const items = Array.isArray(meta[cfg.key]) ? meta[cfg.key] : [];
    if (!items.length && !cfg.emptyText) return '';
    return `<div class="d-card">
      <div class="d-kicker">${esc(cfg.label)}</div>
      <ul class="d-list">${items.length ? items.map(item => `<li>${esc(item)}</li>`).join('') : `<li>${esc(cfg.emptyText)}</li>`}</ul>
    </div>`;
  }).filter(Boolean).join('');

  // Meta chips
  const chipsHtml = metaChips.map(key => {
    const items = Array.isArray(meta[key]) ? meta[key] : [];
    if (!items.length) return '';
    return `<div class="d-card">
      <div class="d-kicker">${esc(key)}</div>
      <div class="chips" style="margin-top:6px">${items.map(t => `<span class="chip">#${esc(t)}</span>`).join('')}</div>
    </div>`;
  }).filter(Boolean).join('');

  // Meta fields — simple key-value pairs from node.meta
  const metaFieldsHtml = metaFieldsDef.map(f => {
    const val = meta[f.key];
    if (!val) return '';
    return `<div class="kv"><div class="k">${esc(f.label)}</div><div class="v">${esc(val)}</div></div>`;
  }).filter(Boolean).join('');

  // External link
  let linkHtml = '';
  if (metaLink && meta[metaLink.key]) {
    linkHtml = `<a class="notion-link" href="${esc(meta[metaLink.key])}" target="_blank" rel="noopener">${esc(metaLink.icon || '↗')} ${esc(metaLink.label || 'Open')}</a>`;
  }

  // Impact table
  const impactRows = [...nodes]
    .sort((a, b) => degree[b.id] - degree[a.id])
    .slice(0, 8)
    .map(nd => `<tr><td style="color:${layers[nd.layer]||'#818cf8'}">${esc(nd.label.length>24?nd.label.slice(0,23)+'…':nd.label)}</td><td class="deg" style="color:${degree[nd.id]/maxDegree>0.6?'#ef4444':degree[nd.id]/maxDegree>0.35?'#f59e0b':'#38bdf8'}">${degree[nd.id]}</td></tr>`)
    .join('');

  panel.innerHTML = `
    ${validationWarnings.length ? `
    <div class="d-card warning-note">
      <div class="d-kicker">Dataset warnings</div>
      <p class="d-desc" style="margin-top:6px">Validation passed, but this map ships with data issues worth reviewing.</p>
      <ul class="d-list">
        ${validationWarnings.slice(0, 4).map(item => `<li>${esc(item)}</li>`).join('')}
        ${validationWarnings.length > 4 ? `<li>${validationWarnings.length - 4} more warning${validationWarnings.length - 4 === 1 ? '' : 's'} not shown</li>` : ''}
      </ul>
    </div>` : ''}

    <div class="d-card">
      <div class="d-kicker">${esc(n.layer)} · ${esc(n.type)}</div>
      <div class="d-title">${esc(n.label)}</div>
      ${meta.desc ? `<p class="d-desc">${esc(meta.desc)}</p>` : ''}
      <div class="chips">
        <span class="chip" style="color:${col};border-color:${col}30">${esc(n.layer)}</span>
        ${n.status ? `<span class="chip">${esc(n.status)}</span>` : ''}
      </div>
      ${linkHtml}
      ${state.focusNode !== n.id
        ? `<br/><a class="notion-link" style="color:var(--muted);margin-top:4px" href="#" id="focusLink">⊙ Click node again to focus tree</a>`
        : `<br/><a class="notion-link" style="color:#ef4444;margin-top:4px" href="#" id="unfocusLink">✕ Clear focus</a>`
      }
    </div>

    <div class="d-card">${kvHtml}</div>

    ${(inbound.length || outbound.length) ? `
    <div class="d-card">
      <div class="d-kicker">Inbound (${inbound.length})</div>
      <ul class="d-list">
        ${inbound.length ? inbound.map(r=>`<li>${esc(r.label)} <span>(${esc(r.layer)})</span></li>`).join('') : '<li>None</li>'}
      </ul>
    </div>

    <div class="d-card">
      <div class="d-kicker">Outbound (${outbound.length})</div>
      <ul class="d-list">
        ${outbound.length ? outbound.map(r=>`<li>${esc(r.label)} <span>(${esc(r.layer)})</span></li>`).join('') : '<li>None</li>'}
      </ul>
    </div>` : ''}

    ${arraysHtml}
    ${chipsHtml}
    ${metaFieldsHtml ? `<div class="d-card">${metaFieldsHtml}</div>` : ''}

    ${state.pathMode && pathSteps.length > 1 ? `
    <div class="d-card">
      <div class="d-kicker">⤳ Path (${pathSteps.length - 1} hop${pathSteps.length - 1 !== 1 ? 's' : ''})</div>
      <ul class="d-list" style="margin-top:6px">
        ${pathSteps.map((id, i) => {
          const pn = nodeMap[id];
          const marker = i === 0 ? '●' : i === pathSteps.length - 1 ? '◎' : '→';
          const col = i === 0 ? '#34d399' : i === pathSteps.length - 1 ? '#f59e0b' : '#818cf8';
          return `<li style="color:${col};cursor:pointer" data-path-node="${id}">${marker} ${esc(pn?.label || id)} <span>(${esc(pn?.layer || '')})</span></li>`;
        }).join('')}
      </ul>
    </div>` : ''}

    <div class="d-card">
      <div class="d-kicker">🌡 Impact — top nodes by connections</div>
      <table class="impact-table">
        <thead><tr><th>Node</th><th style="text-align:right">Edges</th></tr></thead>
        <tbody>${impactRows}</tbody>
      </table>
    </div>
  `;

  document.getElementById('focusLink')?.addEventListener('click', e => {
    e.preventDefault();
    state.focusNode = n.id;
    layoutCache = null;
    render(false);
  });
  document.getElementById('unfocusLink')?.addEventListener('click', e => {
    e.preventDefault();
    state.focusNode = null;
    layoutCache = null;
    render(true);
  });

  // Path chain click-to-navigate
  panel.querySelectorAll('[data-path-node]').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedId = el.dataset.pathNode;
      render(false);
    });
  });
}

// ── Render: Orchestrator ─────────────────────────────────────────────────────
function render(refit = true) {
  computePathHighlights();
  recordPathHistory();
  updatePathBar();
  renderFocusModes();
  const visIds = getVisibleIds();
  renderDataQuality();
  renderStats(visIds);
  renderMap(visIds);
  renderDetail(visIds);
  if (refit && layoutCache) {
    fitToView(layoutCache.w, layoutCache.h);
  }
  writeStateToUrl();
  writeMapBookmark();
}

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(str) {
  const el = document.createElement('span');
  el.textContent = String(str ?? '');
  return el.innerHTML;
}

function populateSelect(id, values) {
  const el = document.getElementById(id);
  el.innerHTML = ['All', ...new Set(values)].map(v => `<option value="${v}">${v}</option>`).join('');
}

// ── Map Selector (manifest-driven) ───────────────────────────────────────────
function setupMapSelector(maps, initialId) {
  const sel = document.getElementById('mapSelect');
  sel.innerHTML = maps.map(m =>
    `<option value="${m.id}" title="${esc(m.description || '')}">${esc(getMapLabel(m))}</option>`
  ).join('');
  sel.value = initialId;

  sel.addEventListener('change', async () => {
    const entry = getMapEntry(sel.value);
    const ok = await loadMapPack(entry);
    if (ok) {
      render();
    }
  });
}

// ── Event Wiring ─────────────────────────────────────────────────────────────
applyTheme(getInitialTheme());

let st;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => {
    pushUndoSnapshot();
    state.search = e.target.value.trim();
    state.focusNode = null;
    layoutCache = null;
    render();
  }, 130);
});

document.getElementById('layerF').addEventListener('change', e => {
  pushUndoSnapshot();
  state.layer = e.target.value;
  state.focusNode = null;
  layoutCache = null;
  render();
});

document.getElementById('heatBtn').addEventListener('click', () => {
  state.heatmap = !state.heatmap;
  document.getElementById('heatBtn').textContent = state.heatmap ? '🌡 Heatmap ON' : '🌡 Heatmap';
  render(false);
});

document.getElementById('themeBtn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem(THEME_KEY, next); } catch {}
  writeStateToUrl();
});

document.getElementById('pathBtn').addEventListener('click', () => {
  pushUndoSnapshot();
  state.pathMode = !state.pathMode;
  if (!state.pathMode) { state.pathTarget = null; lastRecordedPathKey = ''; }
  document.getElementById('pathBtn').textContent = state.pathMode ? '⤳ Path ON' : '⤳ Path';
  render(false);
});

document.getElementById('pathTargetSelect').addEventListener('change', e => {
  pushUndoSnapshot();
  state.pathTarget = e.target.value || null;
  render(false);
});

document.getElementById('pathHistorySelect').addEventListener('change', e => {
  const entry = pathHistory.find((item) => item.key === e.target.value && item.mapId === currentMapId);
  if (!entry) return;
  pushUndoSnapshot();
  state.selectedId = entry.selectedId;
  state.pathMode = true;
  state.pathTarget = entry.pathTarget;
  layoutCache = null;
  render(false);
});

document.getElementById('pathClear').addEventListener('click', () => {
  pushUndoSnapshot();
  state.pathMode = false;
  state.pathTarget = null;
  lastRecordedPathKey = '';
  document.getElementById('pathBtn').textContent = '⤳ Path';
  render(false);
});

document.getElementById('fitBtn').addEventListener('click', () => {
  if (layoutCache) fitToView(layoutCache.w, layoutCache.h);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  clearTimeout(st);
  pushUndoSnapshot();
  const defaults = presentation.defaults || {};
  Object.assign(state, {
    search: '',
    layer: defaults.initialLayer || 'All',
    focus: defaults.initialFocusMode || 'All',
    selectedId: nodes[0]?.id || null,
    focusNode: null,
    heatmap: defaults.showHeatmap || false,
    pathMode: false,
    pathTarget: null,
  });
  lastRecordedPathKey = '';
  syncControlsFromState();
  layoutCache = null;
  render();
});

document.getElementById('undoBtn').addEventListener('click', performUndo);
document.getElementById('redoBtn').addEventListener('click', performRedo);

document.addEventListener('keydown', (event) => {
  const meta = event.metaKey || event.ctrlKey;
  if (!meta) return;
  const tag = event.target?.tagName?.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  if (event.key.toLowerCase() === 'z' && !event.shiftKey) {
    event.preventDefault();
    performUndo();
    return;
  }
  if (event.key.toLowerCase() === 'z' && event.shiftKey) {
    event.preventDefault();
    performRedo();
  }
});

// Bind initial node group handlers
document.getElementById('nodeGroup').addEventListener('keydown', handleNodeKeydown);
document.getElementById('nodeGroup').onclick = handleNodeClick;

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  const urlState = readStateFromUrl();
  loadPathHistory();
  updateUndoButtons();

  // 1. Load manifest
  const m = await loadManifest();
  if (!m) return;

  // 2. Resolve initial map
  const requestedMap = urlState.map;
  const validMap = m.maps.find(entry => entry.id === requestedMap);
  const initialMap = validMap || m.maps[0];

  // 3. Setup selector
  setupMapSelector(m.maps, initialMap.id);

  // 4. Load the map pack
  const ok = await loadMapPack(initialMap);
  if (!ok) return;

  // 5. Apply URL state overrides
  if (urlState.node && nodeMap[urlState.node]) state.selectedId = urlState.node;
  if (urlState.layer) { state.layer = urlState.layer; document.getElementById('layerF').value = urlState.layer; }
  if (urlState.focus) state.focus = urlState.focus;
  if (urlState.heat === '1') { state.heatmap = true; document.getElementById('heatBtn').textContent = '🌡 Heatmap ON'; }
  if (urlState.q) { state.search = urlState.q; document.getElementById('search').value = urlState.q; }
  if (urlState.theme) applyTheme(urlState.theme);
  if (urlState.path) {
    const [src, tgt] = urlState.path.split(',');
    if (src && tgt && nodeMap[src] && nodeMap[tgt]) {
      state.selectedId = src;
      state.pathMode = true;
      state.pathTarget = tgt;
      document.getElementById('pathBtn').textContent = '⤳ Path ON';
    }
  }

  layoutCache = null;
  render();
})();
</script>
</body>
</html>
